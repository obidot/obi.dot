[profile.default]
src = "src"
out = "out"
libs = ["lib", "node_modules"]
solc_version = "0.8.28"
optimizer = true
optimizer_runs = 200
via_ir = false
ffi = false
fuzz = { runs = 1000, max_test_rejects = 65536 }
invariant = { runs = 256, depth = 64 }

remappings = [
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
    "@pythnetwork/pyth-sdk-solidity/=lib/pyth-sdk-solidity/",
    "forge-std/=lib/forge-std/src/",
]

# CI profile — verbose output, strict checks
[profile.ci]
src = "src"
out = "out"
libs = ["lib", "node_modules"]
solc_version = "0.8.28"
optimizer = true
optimizer_runs = 200
verbosity = 4
fuzz = { runs = 5000, max_test_rejects = 65536 }
invariant = { runs = 512, depth = 128 }

remappings = [
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
    "@pythnetwork/pyth-sdk-solidity/=lib/pyth-sdk-solidity/",
    "forge-std/=lib/forge-std/src/",
]

# Polkadot deployment profile — uses Revive LLVM compiler (resolc)
# Usage: FOUNDRY_PROFILE=polkadot forge build
[profile.polkadot]
src = "src"
out = "out"
libs = ["lib", "node_modules"]
solc_version = "0.8.28"
optimizer = true
optimizer_runs = 200

remappings = [
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
    "@pythnetwork/pyth-sdk-solidity/=lib/pyth-sdk-solidity/",
    "forge-std/=lib/forge-std/src/",
]

[profile.polkadot.polkadot]
resolc_compile = true
solc_version = "0.8.28"

# RPC endpoints
[rpc_endpoints]
local = "http://127.0.0.1:8545"
polkadot_hub_testnet = "https://services.polkadothub-rpc.com/testnet"
westend_hub = "https://westend-asset-hub-eth-rpc.polkadot.io"
kusama_hub = "https://kusama-asset-hub-eth-rpc.polkadot.io"

[etherscan]
polkadot_hub_testnet = { key = "${ETHERSCAN_API_KEY}", chain = 420420417 }

# See more config options https://github.com/nicholasgasior/foundry-polkadot/blob/main/crates/config/README.md#all-options
